version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: estateflow_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - estateflow_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: estateflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - estateflow_network

  # Node/Express Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: estateflow_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/estateflow
      - JWT_SECRET=royalplots-super-secret-key-12345
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - mongodb
      - redis
    networks:
      - estateflow_network

  # React Frontend (served via Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: estateflow_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - estateflow_network

volumes:
  mongodb_data:
  redis_data:

networks:
  estateflow_network:
    driver: bridge
